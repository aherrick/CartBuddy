name: ios

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, ajmacmini]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build / Deploy iOS
        env:
          Kroger__ClientId: ${{ secrets.KROGER_CLIENT_ID }}
          Kroger__ClientSecret: ${{ secrets.KROGER_CLIENT_SECRET }}
          IOS_DEVICE_UDID: ${{ secrets.IOS_DEVICE_UDID }}
          IS_DEPLOY: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ "$IS_DEPLOY" = "true" ]; then
            EXTRA="-t:Run -c Debug -p:_DeviceName=$IOS_DEVICE_UDID"
          else
            EXTRA="-c Release"
          fi
          dotnet build CartBuddy/CartBuddy.csproj \
            $EXTRA \
            -f net10.0-ios \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="Apple Development: Andrew Herrick (J342D9426H)" \
            -p:CodesignProvision="AJH Wildcard"
         
name: ios

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, ajmacmini]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.200'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build app for device
        run: |
          dotnet build CartBuddy/CartBuddy.csproj \
            -f net10.0-ios \
            -c Debug \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:CodesignKey="Apple Development: Andrew Herrick (J342D9426H)" \
            -p:CodesignProvision="AJH Wildcard"

      - name: Install and launch on device
        timeout-minutes: 2
        run: |
          APP_PATH="CartBuddy/bin/Debug/net10.0-ios/ios-arm64/CartBuddy.app"

          xcrun devicectl device install app \
            --device "${{ secrets.IOS_DEVICE_UDID }}" \
            "$APP_PATH"

          xcrun devicectl device process launch \
            --terminate-existing \
            --console \
            --device "${{ secrets.IOS_DEVICE_UDID }}" \
            com.ajh.cartbuddy
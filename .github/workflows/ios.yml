name: ios

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, ajmacmini]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build iOS
        if: github.event_name == 'push'
        run: dotnet build CartBuddy/CartBuddy.csproj -f net10.0-ios

      - name: Deploy to device
        if: github.event_name == 'workflow_dispatch'
        env:
          Kroger__ClientId: ${{ secrets.KROGER_CLIENT_ID }}
          Kroger__ClientSecret: ${{ secrets.KROGER_CLIENT_SECRET }}
        run: |
          dotnet build CartBuddy/CartBuddy.csproj \
            -t:Run \
            -f net10.0-ios \
            -c Release \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:_DeviceName=${{ secrets.IOS_DEVICE_UDID }} \
            -p:CodesignKey="Apple Development: Andrew Herrick (J342D9426H)" \
            -p:CodesignProvision="AJH Wildcard"